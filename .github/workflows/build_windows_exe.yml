
name: Build AI Data Entry EXE Phase3

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install deps
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile app.py --name AI_Data_Entry_Phase3

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AI_Data_Entry_Phase3_EXE
        path: dist/AI_Data_Entry_Phase3.exe
        
