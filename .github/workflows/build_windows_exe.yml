name: Build Flet Gemini AI EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole main.py --name AI_Data_Entry_Gemini_Flet

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AI_Data_Entry_Gemini_Flet_EXE
          path: dist/AI_Data_Entry_Gemini_Flet.exe
