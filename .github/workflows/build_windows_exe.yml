name: Build Windows EXE with Flet

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # More stable for current libraries
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --only-binary :all: -r requirements.txt
        # Binary versions select pannuna compile error varathu
        python -m spacy download en_core_web_sm

    - name: Build EXE with PyInstaller
      run: |
        # --collect-all spacy - spaCy files-ah correct-ah bundle panna ithu venum
        pyinstaller --onefile --noconsole --collect-all spacy --collect-all en_core_web_sm main.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DataEntryAI-Flet-EXE
        path: dist/main.exe
