name: Build Windows EXE with Flet

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        # GitHub environment-la model-ah download panna indha line mukkiyam
        python -m spacy download en_core_web_sm

    - name: Build EXE with PyInstaller
      run: |
        # '--collect-all' flag dhaan model-ah EXE kulla thallum
        pyinstaller --noconfirm --onefile --windowed --collect-all spacy --collect-all en_core_web_sm main.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DataEntryAI-App
        path: dist/main.exe
        
