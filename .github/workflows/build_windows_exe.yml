name: Build Windows EXE with Flet

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Updated to v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Updated to v5
      with:
        python-version: '3.9'
        cache: 'pip' # Dependencies-a cache panna build fast-a aagum

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconsole main.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4 # FIX: Updated to v4
      with:
        name: DataEntryAI-Flet-EXE
        path: dist/main.exe
        retention-days: 5 # File-a GitHub-la evalo naal vekknum nu specify panlam
        
