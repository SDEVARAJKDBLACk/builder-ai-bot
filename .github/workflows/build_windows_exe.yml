name: Build AI Data Entry EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - run: pip install -r requirements.txt
    - run: pyinstaller --onefile ui_app.py
    - uses: actions/upload-artifact@v4
      with:
        name: AI_Data_Entry_EXE
        path: dist/ui_app.exe
        
